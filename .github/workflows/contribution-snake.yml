name: Generate contribution signal

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate black-and-gold contribution animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#D4A017&color_dots=#EBEDF0,#D8C879,#C0A646,#A88618,#6E5700
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#F5C518&color_dots=#161B22,#3A320E,#6C5900,#A88900,#F5C518

      - name: Publish animations to the output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
