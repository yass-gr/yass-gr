name: Generate contribution signal

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate black-and-gold contribution animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#F2CE99&color_dots=#EBEDF0,#E8D5B8,#DDBF8A,#C9A66B,#B8914A
            dist/github-contribution-grid-snake-dark.svg?color_snake=#F2CE99&color_dots=#161B22,#EAC890,#F0D6A4,#F2DCAF,#F2CE99

      - name: Publish animations to the output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
